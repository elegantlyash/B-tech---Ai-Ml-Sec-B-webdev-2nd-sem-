<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a2a, #2d5a3d);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #b7e4c7;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #74c69d;
        }

        input:focus {
            outline: none;
            border-color: #40916c;
        }

        button {
            padding: 10px 20px;
            background: #40916c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2d6a4f;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid #40916c;
            margin-bottom: 6px;
            background: #f0faf4;
        }

        .weather-item label {
            color: #2d6a4f;
            font-weight: bold;
        }

        .weather-item span {
            color: #1b4332;
        }

        /* -------- HISTORY SECTION -------- */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-header h3 {
            margin: 0;
            color: #2d6a4f;
        }

        h3 {
            color: #2d6a4f;
        }

        .clear-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: #d62828;
            border-radius: 20px;
        }

        .clear-btn:hover {
            background: #a61c1c;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .history-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: #d8f3dc;
            color: #1b4332;
            border: 1.5px solid #74c69d;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .history-btn:hover {
            background: #b7e4c7;
            border-color: #40916c;
            color: #1b4332;
        }

        .history-btn .del-x {
            font-size: 14px;
            color: #74c69d;
            line-height: 1;
            padding: 0 2px;
            border-radius: 50%;
            cursor: pointer;
        }

        .history-btn .del-x:hover {
            color: #d62828;
        }

        .no-history {
            color: #95d5b2;
            font-size: 13px;
            font-style: italic;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌿 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>

                <div class="history-header">
                    <h3>Search History</h3>
                    <button class="clear-btn" id="clearAllBtn">Clear All</button>
                </div>
                <div class="history-list" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "89e505e85d0b0cab4727443717fe2350";
        const STORAGE_KEY = "weatherHistory";
        const MAX_HISTORY = 10;

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("City not found");
                throw new Error("City not found");
            }
            return res.json();
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            let history = getStoredHistory();
            history = history.filter(c => c.toLowerCase() !== city.toLowerCase());
            history.unshift(city);
            if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            showHistory();
        }

        /* ---------- GET HISTORY FROM STORAGE ---------- */
        function getStoredHistory() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        /* ---------- REMOVE ONE ITEM FROM HISTORY ---------- */
        function removeHistoryItem(city) {
            let history = getStoredHistory().filter(c => c.toLowerCase() !== city.toLowerCase());
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const history = getStoredHistory();
            if (history.length === 0) {
                historyBox.innerHTML = `<span class="no-history">No recent searches yet.</span>`;
                return;
            }

            historyBox.innerHTML = history.map(city => `
                <div class="history-btn">
                    <span class="city-label" data-city="${city}">🔍 ${city}</span>
                    <span class="del-x" data-del="${city}" title="Remove">✕</span>
                </div>
            `).join("");

            historyBox.querySelectorAll(".city-label").forEach(el => {
                el.addEventListener("click", () => {
                    cityInput.value = el.dataset.city;
                    search(el.dataset.city);
                });
            });

            historyBox.querySelectorAll(".del-x").forEach(el => {
                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    removeHistoryItem(el.dataset.del);
                });
            });
        }

        /* ---------- CLEAR ALL HISTORY ---------- */
        document.getElementById("clearAllBtn").onclick = () => {
            localStorage.removeItem(STORAGE_KEY);
            showHistory();
        };

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "<p style='color:#40916c'>Fetching weather…</p>";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
